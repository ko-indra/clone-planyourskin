<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <title>Keranjang Belanja - Plan Your Skin</title>
  <meta name="description" content="Keranjang belanja Plan Your Skin">

  <link rel="shortcut icon" href="/wp-content/uploads/2025/05/logo_plan_your_skin_square.webp" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Poppins', sans-serif; font-size: 14px; line-height: 1.7; color: #777; background: #fff; }
    a { color: #222529; text-decoration: none; }
    img { max-width: 100%; height: auto; }

    .cart-header {
      text-align: center;
      padding: 30px 20px 10px;
      border-bottom: 1px solid #eee;
    }
    .cart-header a { display: inline-block; margin-bottom: 20px; }
    .cart-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2em;
      color: #222;
      margin: 0 0 5px;
    }

    .cart-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .cart-table { width: 100%; border-collapse: collapse; }
    .cart-table th {
      text-align: left;
      padding: 12px 0;
      border-bottom: 2px solid #222;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #222;
    }
    .cart-table td {
      padding: 16px 0;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }
    .cart-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #eee; }
    .cart-item-info { display: flex; align-items: center; gap: 15px; }
    .cart-item-title { font-weight: 600; color: #222; font-size: 14px; display: block; }
    .cart-item-type { font-size: 12px; color: #999; }
    .cart-item-price { font-weight: 600; color: #222; white-space: nowrap; }

    .cart-qty { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; width: fit-content; }
    .cart-qty button { width: 32px; height: 32px; background: #f9f9f9; border: none; cursor: pointer; font-size: 16px; color: #222; }
    .cart-qty button:hover { background: #eee; }
    .cart-qty input { width: 40px; height: 32px; border: none; text-align: center; font-family: inherit; font-size: 13px; font-weight: 600; outline: none; }

    .cart-remove { background: none; border: none; color: #999; cursor: pointer; font-size: 20px; padding: 4px 8px; transition: color 0.2s; }
    .cart-remove:hover { color: #b93027; }

    .cart-summary { border-top: 2px solid #222; margin-top: 20px; padding-top: 20px; }
    .cart-summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
    .cart-summary-row.total { font-size: 18px; font-weight: 700; color: #222; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
    .cart-summary-row .savings { color: #b93027; font-weight: 600; }

    .cart-actions { display: flex; gap: 12px; margin-top: 25px; justify-content: flex-end; flex-wrap: wrap; }
    .btn-continue { padding: 14px 28px; border: 1px solid #222; background: #fff; color: #222; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; display: inline-flex; align-items: center; }
    .btn-checkout { padding: 14px 36px; background: #222; color: #fff; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; display: inline-flex; align-items: center; transition: background 0.3s; }
    .btn-checkout:hover { background: #444; }

    .cart-empty { text-align: center; padding: 60px 20px; }
    .cart-empty h2 { font-family: 'Playfair Display', serif; color: #222; margin-bottom: 10px; }
    .cart-empty a { display: inline-block; margin-top: 20px; padding: 12px 30px; background: #222; color: #fff; font-weight: 600; font-size: 13px; text-transform: uppercase; }

    @media (max-width: 640px) {
      .cart-table th:nth-child(3), .cart-table td:nth-child(3) { display: none; }
      .cart-item-img { width: 60px; height: 60px; }
      .cart-actions { flex-direction: column; }
      .btn-continue, .btn-checkout { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="cart-header">
  <a href="/"><img src="/wp-content/uploads/2025/04/LOGO-PLAN-YOUR-SKIN.png" alt="Plan Your Skin" style="height:40px;"></a>
  <h1>Keranjang Belanja</h1>
</div>

<div class="cart-container" id="cartContent"></div>

<script src="/js/app.js"></script>
<script src="/js/cart.js"></script>
<script>
  function renderCartPage() {
    const container = document.getElementById('cartContent');
    const items = PYSCart.getItems();

    if (items.length === 0) {
      container.innerHTML = '<div class="cart-empty"><h2>Keranjang Kamu Kosong</h2><p>Belum ada produk di keranjang belanja kamu.</p><a href="/shop/">BELANJA SEKARANG</a></div>';
      return;
    }

    const total = PYSCart.getTotal();
    const savings = PYSCart.getSavings();

    container.innerHTML = `
      <table class="cart-table">
        <thead><tr><th>Produk</th><th>Harga</th><th>Jumlah</th><th>Subtotal</th><th></th></tr></thead>
        <tbody>
          ${items.map(item => `
            <tr>
              <td><div class="cart-item-info"><img class="cart-item-img" src="${item.image}" alt="${item.title}"><div><a href="/product/${item.handle}" class="cart-item-title">${item.title}</a><span class="cart-item-type">${item.product_type}</span></div></div></td>
              <td class="cart-item-price">${formatPrice(item.price)}</td>
              <td><div class="cart-qty"><button onclick="updateCartQty('${item.handle}', ${item.qty - 1})">−</button><input type="number" value="${item.qty}" min="1" onchange="updateCartQty('${item.handle}', parseInt(this.value))"><button onclick="updateCartQty('${item.handle}', ${item.qty + 1})">+</button></div></td>
              <td class="cart-item-price">${formatPrice(parseFloat(item.price) * item.qty)}</td>
              <td><button class="cart-remove" onclick="removeCartItem('${item.handle}')">×</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div class="cart-summary">
        ${savings > 0 ? `<div class="cart-summary-row"><span>Total Hemat</span><span class="savings">- ${formatPrice(savings)}</span></div>` : ''}
        <div class="cart-summary-row total"><span>Total</span><span>${formatPrice(total)}</span></div>
      </div>
      <div class="cart-actions">
        <a href="/shop/" class="btn-continue">← LANJUT BELANJA</a>
        <a href="/checkout/" class="btn-checkout">CHECKOUT →</a>
      </div>
    `;
  }

  function updateCartQty(handle, qty) {
    if (qty < 1) { removeCartItem(handle); return; }
    PYSCart.updateQty(handle, qty);
    renderCartPage();
  }

  function removeCartItem(handle) {
    PYSCart.removeItem(handle);
    renderCartPage();
  }

  document.addEventListener('DOMContentLoaded', renderCartPage);
</script>
</body>
</html>
