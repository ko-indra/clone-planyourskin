<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <title>Checkout - Plan Your Skin</title>

  <link rel="shortcut icon" href="/wp-content/uploads/2025/05/logo_plan_your_skin_square.webp" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Poppins', sans-serif; font-size: 14px; line-height: 1.7; color: #777; background: #f9f9f9; }
    a { color: #222; text-decoration: none; }

    .co-header { text-align: center; padding: 25px 20px 15px; background: #fff; border-bottom: 1px solid #eee; }
    .co-header h1 { font-family: 'Playfair Display', serif; font-size: 1.8em; color: #222; margin: 10px 0 0; }

    .co-wrapper { max-width: 1100px; margin: 0 auto; padding: 30px 20px 60px; display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
    @media (max-width: 768px) { .co-wrapper { grid-template-columns: 1fr; } }

    .co-card { background: #fff; border-radius: 10px; padding: 25px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .co-card h3 { font-family: 'Playfair Display', serif; font-size: 1.2em; color: #222; margin: 0 0 18px; }

    .co-field { margin-bottom: 14px; }
    .co-field label { display: block; font-size: 12px; font-weight: 600; color: #222; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .co-field input, .co-field select, .co-field textarea {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px;
      font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
      background: #fff;
    }
    .co-field input:focus, .co-field select:focus, .co-field textarea:focus { border-color: #222; }
    .co-field textarea { resize: vertical; min-height: 70px; }
    .co-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 500px) { .co-row { grid-template-columns: 1fr; } }

    /* Shipping options */
    .shipping-options { margin-top: 10px; }
    .shipping-option {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 8px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .shipping-option:hover { border-color: #aaa; }
    .shipping-option.selected { border-color: #222; background: #fafafa; }
    .shipping-option input[type="radio"] { margin-right: 10px; }
    .shipping-label { flex: 1; }
    .shipping-name { font-weight: 600; color: #222; font-size: 13px; }
    .shipping-etd { font-size: 11px; color: #999; }
    .shipping-cost { font-weight: 700; color: #222; font-size: 14px; white-space: nowrap; }
    .shipping-loading { text-align: center; padding: 15px; color: #999; font-size: 13px; }

    /* Order summary */
    .co-summary-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; align-items: center; }
    .co-summary-img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; border: 1px solid #eee; flex-shrink: 0; }
    .co-summary-info { flex: 1; min-width: 0; }
    .co-summary-title { font-size: 12px; font-weight: 600; color: #222; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .co-summary-qty { font-size: 11px; color: #999; margin: 2px 0 0; }
    .co-summary-price { font-weight: 600; color: #222; font-size: 13px; white-space: nowrap; }

    .co-totals { margin-top: 15px; padding-top: 15px; border-top: 2px solid #222; }
    .co-total-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
    .co-total-row.grand { font-size: 17px; font-weight: 700; color: #222; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
    .co-total-row .text-red { color: #b93027; }

    .btn-pay {
      width: 100%; padding: 16px; margin-top: 20px;
      background: #222; color: #fff; border: none; border-radius: 6px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px;
      transition: background 0.3s;
    }
    .btn-pay:hover { background: #444; }
    .btn-pay:disabled { background: #aaa; cursor: not-allowed; }

    .co-empty { text-align: center; padding: 60px 20px; }
    .co-empty h2 { font-family: 'Playfair Display', serif; color: #222; }
    .co-empty a { display: inline-block; margin-top: 15px; padding: 12px 28px; background: #222; color: #fff; font-weight: 600; }
  </style>
</head>
<body>

<div class="co-header">
  <a href="/"><img src="/wp-content/uploads/2025/04/LOGO-PLAN-YOUR-SKIN.png" alt="Plan Your Skin" style="height:36px;"></a>
  <h1>Checkout</h1>
</div>

<div id="checkoutContent">
  <div class="co-wrapper">
    <!-- LEFT: Form -->
    <div>
      <form id="checkoutForm" onsubmit="handleCheckout(event)">
        <div class="co-card" style="margin-bottom:20px;">
          <h3>Data Penerima</h3>
          <div class="co-field">
            <label for="custName">Nama Lengkap *</label>
            <input type="text" id="custName" required placeholder="Nama lengkap penerima">
          </div>
          <div class="co-row">
            <div class="co-field">
              <label for="custEmail">Email *</label>
              <input type="email" id="custEmail" required placeholder="email@example.com">
            </div>
            <div class="co-field">
              <label for="custPhone">No. Telepon *</label>
              <input type="tel" id="custPhone" required placeholder="08xxxxxxxxxx">
            </div>
          </div>
        </div>

        <div class="co-card" style="margin-bottom:20px;">
          <h3>Alamat Pengiriman</h3>
          <div class="co-field">
            <label for="custAddress">Alamat Lengkap *</label>
            <textarea id="custAddress" required placeholder="Nama jalan, nomor rumah, RT/RW, kelurahan"></textarea>
          </div>
          <div class="co-row">
            <div class="co-field">
              <label for="custProvince">Provinsi *</label>
              <select id="custProvince" required>
                <option value="">-- Pilih Provinsi --</option>
              </select>
            </div>
            <div class="co-field">
              <label for="custCity">Kota / Kabupaten *</label>
              <select id="custCity" required disabled>
                <option value="">-- Pilih Kota --</option>
              </select>
            </div>
          </div>
          <div class="co-row">
            <div class="co-field">
              <label for="custPostal">Kode Pos *</label>
              <input type="text" id="custPostal" required placeholder="12345">
            </div>
            <div class="co-field">
              <label>&nbsp;</label>
            </div>
          </div>
        </div>

        <div class="co-card">
          <h3>Pilih Pengiriman</h3>
          <div class="co-row" style="margin-bottom:12px;">
            <div class="co-field" style="margin-bottom:0;">
              <label for="courierSelect">Kurir</label>
              <select id="courierSelect">
                <option value="jne:sicepat:tiki:pos:anteraja:jnt">Semua Kurir</option>
                <option value="jne">JNE</option>
                <option value="sicepat">SiCepat</option>
                <option value="jnt">J&T</option>
                <option value="tiki">TIKI</option>
                <option value="pos">POS Indonesia</option>
                <option value="anteraja">AnterAja</option>
              </select>
            </div>
          </div>
          <div id="shippingOptions" class="shipping-options">
            <p style="color:#999;font-size:13px;text-align:center;">Pilih provinsi & kota untuk melihat ongkir</p>
          </div>
        </div>

        <button type="submit" id="btnPay" class="btn-pay" style="margin-top:20px;" disabled>BAYAR SEKARANG</button>
      </form>
    </div>

    <!-- RIGHT: Order Summary -->
    <div>
      <div class="co-card" id="orderSummary" style="position:sticky;top:20px;">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>
</div>

<!-- Midtrans Snap JS (loaded dynamically) -->
<script src="/js/app.js"></script>
<script src="/js/cart.js"></script>
<script>
  let selectedShippingCost = 0;
  let selectedCityId = '';
  let selectedCityName = '';

  // ─── Init ───────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    const items = PYSCart.getItems();
    if (items.length === 0) {
      document.getElementById('checkoutContent').innerHTML = '<div class="co-empty"><h2>Keranjang Kosong</h2><p>Tambahkan produk dulu sebelum checkout.</p><a href="/shop/">BELANJA SEKARANG</a></div>';
      return;
    }

    renderSummary();
    loadProvinces();
    loadMidtransSnap();

    // Events
    document.getElementById('custProvince').addEventListener('change', onProvinceChange);
    document.getElementById('custCity').addEventListener('change', onCityChange);
    document.getElementById('courierSelect').addEventListener('change', onCourierChange);
  });

  // ─── Load Midtrans Snap SDK ─────────────────
  async function loadMidtransSnap() {
    try {
      const resp = await fetch('/api/midtrans/client-key');
      const data = await resp.json();
      if (data.clientKey) {
        const script = document.createElement('script');
        script.src = 'https://app.sandbox.midtrans.com/snap/snap.js';
        script.setAttribute('data-client-key', data.clientKey);
        document.head.appendChild(script);
      }
    } catch (e) { console.warn('Midtrans Snap not loaded:', e); }
  }

  // ─── Order Summary ─────────────────────────
  function renderSummary() {
    const items = PYSCart.getItems();
    const total = PYSCart.getTotal();
    const savings = PYSCart.getSavings();
    const grandTotal = total + selectedShippingCost;

    document.getElementById('orderSummary').innerHTML = `
      <h3>Ringkasan Pesanan</h3>
      ${items.map(item => `
        <div class="co-summary-item">
          <img class="co-summary-img" src="${item.image}" alt="${item.title}">
          <div class="co-summary-info">
            <p class="co-summary-title">${item.title}</p>
            <p class="co-summary-qty">${item.qty} × ${formatPrice(item.price)}</p>
          </div>
          <span class="co-summary-price">${formatPrice(parseFloat(item.price) * item.qty)}</span>
        </div>
      `).join('')}
      <div class="co-totals">
        <div class="co-total-row"><span>Subtotal</span><span>${formatPrice(total)}</span></div>
        ${savings > 0 ? `<div class="co-total-row"><span>Hemat</span><span class="text-red">- ${formatPrice(savings)}</span></div>` : ''}
        <div class="co-total-row"><span>Ongkir</span><span>${selectedShippingCost > 0 ? formatPrice(selectedShippingCost) : '<em style="color:#999">Belum dipilih</em>'}</span></div>
        <div class="co-total-row grand"><span>Total</span><span>${formatPrice(grandTotal)}</span></div>
      </div>
    `;
  }

  // ─── RajaOngkir: Provinces ─────────────────
  async function loadProvinces() {
    try {
      const resp = await fetch('/api/shipping/provinces');
      const provinces = await resp.json();
      const sel = document.getElementById('custProvince');
      provinces.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
    } catch (e) { console.error('Error loading provinces:', e); }
  }

  // ─── RajaOngkir: Cities ────────────────────
  async function onProvinceChange() {
    const provId = this.value;
    const citySel = document.getElementById('custCity');
    const courierSel = document.getElementById('courierSelect');
    citySel.innerHTML = '<option value="">-- Pilih Kota --</option>';
    citySel.disabled = true;
    courierSel.disabled = true;
    selectedShippingCost = 0;
    document.getElementById('shippingOptions').innerHTML = '<p style="color:#999;font-size:13px;text-align:center;">Pilih kota untuk melihat ongkir</p>';
    renderSummary();

    if (!provId) return;

    try {
      const resp = await fetch(`/api/shipping/cities?province=${provId}`);
      const cities = await resp.json();
      cities.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        opt.dataset.postal = c.zip_code || '';
        opt.dataset.cityName = c.name;
        citySel.appendChild(opt);
      });
      citySel.disabled = false;
    } catch (e) { console.error('Error loading cities:', e); }
  }

  // ─── On City Change ────────────────────────
  function onCityChange() {
    const sel = this;
    const opt = sel.options[sel.selectedIndex];
    selectedCityId = sel.value;
    selectedCityName = opt?.dataset?.cityName || '';

    // Auto-fill postal code
    if (opt?.dataset?.postal) {
      document.getElementById('custPostal').value = opt.dataset.postal;
    }

    if (selectedCityId) {
      document.getElementById('courierSelect').disabled = false;
      loadShippingCosts();
    }
  }

  // ─── On Courier Change ─────────────────────
  function onCourierChange() {
    if (selectedCityId) loadShippingCosts();
  }

  // ─── RajaOngkir: Shipping Costs ────────────
  async function loadShippingCosts() {
    const container = document.getElementById('shippingOptions');
    const courier = document.getElementById('courierSelect').value;
    container.innerHTML = '<div class="shipping-loading">Menghitung ongkir...</div>';

    // Calculate total weight (assume 300g per item)
    const totalWeight = PYSCart.getItems().reduce((sum, item) => sum + (item.qty * 300), 0);

    try {
      const resp = await fetch('/api/shipping/cost', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          destination: selectedCityId,
          weight: Math.max(totalWeight, 300),
          courier: courier,
        }),
      });
      const results = await resp.json();

      // V2 response: array of courier objects with costs array
      // Format could be: [{ code, name, costs: [{ service, description, cost: [{ value, etd }] }] }]
      // Or flat format: [{ courier_name, courier_code, service, cost, etd }]
      if (!results || !results.length) {
        container.innerHTML = '<p style="color:#999;font-size:13px;text-align:center;">Tidak ada layanan tersedia untuk tujuan ini</p>';
        return;
      }

      // Normalize: V2 may return flat array or nested
      let shippingItems = [];
      results.forEach(r => {
        if (r.costs && Array.isArray(r.costs)) {
          // Nested format (like old API)
          r.costs.forEach(c => {
            const costVal = c.cost?.[0]?.value || c.cost || 0;
            const etd = c.cost?.[0]?.etd || c.etd || '-';
            shippingItems.push({ courier: (r.code || r.courier_code || '').toUpperCase(), service: c.service, cost: costVal, etd: etd });
          });
        } else {
          // Flat format
          shippingItems.push({ courier: (r.courier_code || r.code || '').toUpperCase(), service: r.service || '', cost: r.cost || r.price || 0, etd: r.etd || '-' });
        }
      });

      if (!shippingItems.length) {
        container.innerHTML = '<p style="color:#999;font-size:13px;text-align:center;">Tidak ada layanan tersedia</p>';
        return;
      }

      // Sort by cost
      shippingItems.sort((a, b) => a.cost - b.cost);

      container.innerHTML = shippingItems.map((s, i) => `
        <label class="shipping-option" onclick="selectShipping(${s.cost}, this)">
          <input type="radio" name="shipping" value="${s.cost}" ${i === 0 ? 'checked' : ''}>
          <div class="shipping-label">
            <div class="shipping-name">${s.courier} ${s.service}</div>
            <div class="shipping-etd">${s.etd} hari</div>
          </div>
          <span class="shipping-cost">${formatPrice(s.cost)}</span>
        </label>
      `).join('');

      // Auto-select first (cheapest) option
      selectShipping(shippingItems[0].cost, container.querySelector('.shipping-option'));

    } catch (e) {
      console.error('Error loading shipping costs:', e);
      container.innerHTML = '<p style="color:#b93027;font-size:13px;text-align:center;">Gagal menghitung ongkir. Coba lagi.</p>';
    }
  }

  function selectShipping(cost, el) {
    document.querySelectorAll('.shipping-option').forEach(o => o.classList.remove('selected'));
    if (el) el.classList.add('selected');
    selectedShippingCost = cost;
    document.getElementById('btnPay').disabled = false;
    renderSummary();
  }

  // ─── Handle Checkout ───────────────────────
  async function handleCheckout(e) {
    e.preventDefault();

    const btn = document.getElementById('btnPay');
    const items = PYSCart.getItems();

    if (items.length === 0) { alert('Keranjang kosong!'); return; }
    if (selectedShippingCost === 0) { alert('Pilih metode pengiriman terlebih dahulu.'); return; }

    const name = document.getElementById('custName').value.trim();
    const email = document.getElementById('custEmail').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    const address = document.getElementById('custAddress').value.trim();
    const postalCode = document.getElementById('custPostal').value.trim();

    if (!name || !email || !phone || !address || !selectedCityName || !postalCode) {
      alert('Mohon lengkapi semua data.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Memproses...';

    try {
      const resp = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          items: items.map(item => ({
            id: item.handle,
            name: item.title.substring(0, 50),
            price: Math.round(parseFloat(item.price)),
            quantity: item.qty,
          })),
          customer: { name, email, phone, address, city: selectedCityName, postal_code: postalCode },
          shipping_cost: selectedShippingCost,
        }),
      });

      const data = await resp.json();

      if (data.error) throw new Error(data.error);

      if (data.token && window.snap) {
        window.snap.pay(data.token, {
          onSuccess: function(result) {
            PYSCart.clear();
            window.location.href = '/checkout/success.html?order_id=' + data.order_id;
          },
          onPending: function(result) {
            alert('Pembayaran pending. Silakan selesaikan pembayaran Anda.');
            btn.disabled = false; btn.textContent = 'BAYAR SEKARANG';
          },
          onError: function(result) {
            alert('Pembayaran gagal. Silakan coba lagi.');
            btn.disabled = false; btn.textContent = 'BAYAR SEKARANG';
          },
          onClose: function() {
            btn.disabled = false; btn.textContent = 'BAYAR SEKARANG';
          },
        });
      } else if (data.token) {
        alert('Midtrans Snap belum dimuat. Refresh halaman dan coba lagi.');
        btn.disabled = false; btn.textContent = 'BAYAR SEKARANG';
      }
    } catch (error) {
      console.error('Checkout error:', error);
      alert('Terjadi kesalahan: ' + error.message);
      btn.disabled = false; btn.textContent = 'BAYAR SEKARANG';
    }
  }
</script>
</body>
</html>
