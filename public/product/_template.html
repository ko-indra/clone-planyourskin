<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <title>Loading Product... - Plan Your Skin</title>
  <meta name="description" content="Plan Your Skin - Skincare yang #IntinyaAjaCukup">

  <link rel="shortcut icon" href="/wp-content/uploads/2025/05/logo_plan_your_skin_square.webp" type="image/x-icon">
  <link rel="apple-touch-icon" href="/wp-content/uploads/2025/05/logo_plan_your_skin_square.webp">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ── Header banner & footer dark bg (white text is invisible without it) ── */
    .banner-section,
    .banner-section .elementor-container,
    .banner-section .elementor-column,
    .banner-section .elementor-widget-wrap {
      background-color: #222529 !important;
    }
    .banner-section .elementor-heading-title,
    .banner-section p {
      color: #fff !important;
    }
    .footer-wrapper,
    #footer.footer {
      background-color: #222529 !important;
      color: #fff !important;
    }
    #footer.footer a,
    #footer.footer p,
    #footer.footer span,
    #footer.footer h1,
    #footer.footer h2,
    #footer.footer h3,
    #footer.footer h4,
    #footer.footer h5,
    #footer.footer li,
    #footer.footer .elementor-heading-title {
      color: #fff !important;
    }
    #footer.footer a:hover {
      color: #ccc !important;
    }

    /* ── Override Porto/Homepage CSS conflicts ────── */
    /* These must use !important to beat the homepage head CSS */

    .pys-product-wrapper h1,
    .pys-product-wrapper h2,
    .pys-product-wrapper h3,
    .pys-product-wrapper h4,
    .pys-product-wrapper p,
    .pys-product-wrapper span,
    .pys-product-wrapper li,
    .pys-product-wrapper div {
      letter-spacing: normal !important;
      font-style: normal !important;
    }

    /* ── Product Detail Layout (matches planyourskin.com) ── */
    .pys-product-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    @media (max-width: 768px) {
      .pys-product-wrapper { grid-template-columns: 1fr; gap: 20px; padding: 15px 15px 40px; }
    }

    /* ── Gallery — thumbs on LEFT, main on RIGHT ───── */
    .pys-gallery {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 10px;
    }
    @media (max-width: 768px) {
      .pys-gallery { grid-template-columns: 1fr; }
      .pys-gallery-thumbs { order: 2; flex-direction: row !important; overflow-x: auto; }
    }
    .pys-gallery-main-wrap {
      position: relative;
      overflow: hidden;
    }
    .pys-gallery-main {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #f5f5f5;
      display: block;
    }
    .pys-badge-sale {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #b93027;
      color: #fff;
      padding: 4px 12px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 700;
      z-index: 2;
    }
    .pys-gallery-thumbs {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      max-height: 500px;
    }
    .product-gallery-thumb {
      width: 72px;
      height: 72px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .product-gallery-thumb.active { border-color: #222; }
    .product-gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Product Info (matches original layout) ───── */
    .pys-product-title {
      font-family: 'Poppins', sans-serif !important;
      font-size: 1.6em !important;
      font-weight: 600 !important;
      color: #222 !important;
      margin: 0 0 15px !important;
      line-height: 1.3 !important;
    }

    /* ── Price ──────────────────────────────────── */
    .pys-price-box { margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .price-compare { font-size: 1em; color: #999; text-decoration: line-through; }
    .price-current { font-size: 1.3em; font-weight: 700; color: #222; }

    /* ── Description — like original (no big heading) ── */
    .pys-description {
      margin-top: 15px;
      color: #666;
      font-size: 14px;
      line-height: 1.8;
    }
    .pys-description h1,
    .pys-description h2,
    .pys-description h3 {
      font-family: 'Poppins', sans-serif !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      color: #333 !important;
      line-height: 1.6 !important;
      margin: 0 0 8px !important;
    }
    .pys-description p {
      font-family: 'Poppins', sans-serif !important;
      margin: 0 0 12px !important;
      font-size: 14px !important;
      line-height: 1.8 !important;
      color: #666 !important;
    }
    .pys-description img { max-width: 100%; height: auto; margin: 10px 0; }

    /* ── Meta (SKU, Categories, Brand) ────────── */
    .pys-meta { border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px; font-size: 13px; }
    .product-meta-item { margin-bottom: 6px; color: #666; }
    .product-meta-item strong { color: #222; margin-right: 8px; font-weight: 600; }
    .product-meta-item a { color: #222; text-decoration: underline; }

    /* ── Quantity + Add to Cart (matches original) ── */
    .pys-qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 0; margin-top: 15px; }
    .pys-qty-control {
      display: flex;
      align-items: center;
      border: 1px solid #ddd;
      overflow: hidden;
    }
    .pys-qty-btn {
      width: 36px;
      height: 42px;
      background: #f9f9f9;
      border: none;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #222;
    }
    .pys-qty-btn:hover { background: #eee; }
    .pys-qty-input {
      width: 45px;
      height: 42px;
      border: none;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      outline: none;
      font-family: inherit;
    }
    .pys-btn-cart {
      flex: 1;
      padding: 12px 24px;
      background: #222;
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px !important;
      transition: background 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 42px;
    }
    .pys-btn-cart:hover { background: #444; }
    .pys-btn-wa {
      width: 42px;
      height: 42px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    .pys-btn-wa:hover { background: #1da851; }

    /* ── Related Products ──────────────────────── */
    .pys-related {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    .pys-related h2 {
      font-family: 'Poppins', sans-serif !important;
      text-align: center;
      font-size: 1.4em !important;
      font-weight: 600 !important;
      margin-bottom: 25px !important;
      color: #222 !important;
    }
    .pys-related-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    @media (max-width: 992px) {
      .pys-related-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .pys-related-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }

    /* ── Product Card (from app.js) ────────────── */
    .product-card { overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .product-card a { text-decoration: none; color: inherit; }
    .product-card-image { position: relative; overflow: hidden; aspect-ratio: 1; background: #f5f5f5; }
    .product-card-image img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.4s; }
    .product-img-hover { position: absolute; top: 0; left: 0; opacity: 0; }
    .product-card:hover .product-img-hover { opacity: 1; }
    .product-card:hover .product-img-main { opacity: 0; }
    .product-card-actions { position: absolute; bottom: -50px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; padding: 10px; transition: bottom 0.3s; }
    .product-card:hover .product-card-actions { bottom: 0; }
    .btn-add-cart { padding: 8px 16px; background: #222; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
    .product-badge { position: absolute; top: 10px; left: 10px; z-index: 2; }
    .badge-sale { background: #b93027; color: #fff; padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 700; }
    .product-card-info { padding: 12px; }
    .product-card-category { font-size: 10px; text-transform: uppercase; letter-spacing: 1px !important; color: #999; margin: 0 0 4px; }
    .product-card-title { font-size: 13px; font-weight: 600; color: #222; margin: 0 0 6px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .product-card-price { font-size: 13px; }
    .product-card-price .price-current { font-weight: 700; color: #222; }
    .product-card-price .price-compare { text-decoration: line-through; color: #999; font-size: 12px; margin-left: 6px; }

    /* ── Loading skeleton ──────────────────────── */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="single-product woocommerce">

<!-- ═══ BREADCRUMB ═══════════════════════════════ -->
<div style="max-width:1200px;margin:0 auto;padding:15px 20px 0;">
  <nav style="font-size:12px;color:#999;text-transform:uppercase;font-weight:500;">
    <a href="/" style="color:#999;">🏠</a>
    <span style="margin:0 6px;">></span>
    <a href="/shop/" style="color:#999;">SHOP</a>
    <span style="margin:0 6px;">></span>
    <span id="breadcrumbCategory" style="color:#999;">SKINCARE</span>
    <span style="margin:0 6px;">></span>
    <span id="breadcrumbTitle" style="color:#222;">Loading...</span>
  </nav>
</div>

<!-- ═══ PRODUCT CONTENT ═════════════════════════ -->
<div class="pys-product-wrapper">
  <!-- Gallery: thumbs left, main right -->
  <div class="pys-gallery">
    <div id="galleryThumbs" class="pys-gallery-thumbs"></div>
    <div class="pys-gallery-main-wrap">
      <span id="saleBadge" class="pys-badge-sale" style="display:none;">-58%</span>
      <img id="mainImage" class="pys-gallery-main skeleton" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Product Image">
    </div>
  </div>

  <!-- Product Info -->
  <div class="pys-product-info">
    <h1 id="productTitle" class="pys-product-title">Loading Product...</h1>

    <div id="productPrice" class="pys-price-box">
      <span class="skeleton" style="display:inline-block;width:150px;height:30px;"></span>
    </div>

    <!-- Description directly under price (like original) -->
    <div class="pys-description">
      <div id="productDesc">
        <div class="skeleton" style="height:16px;width:100%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:16px;width:80%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:16px;width:90%;"></div>
      </div>
    </div>

    <!-- Meta -->
    <div id="productMeta" class="pys-meta"></div>

    <!-- Quantity + Add to Cart (below meta, like original) -->
    <div class="pys-qty-row">
      <div class="pys-qty-control">
        <button id="qtyMinus" class="pys-qty-btn" type="button">−</button>
        <input id="qtyInput" class="pys-qty-input" type="number" value="1" min="1">
        <button id="qtyPlus" class="pys-qty-btn" type="button">+</button>
      </div>
      <button id="btnAddCart" class="pys-btn-cart">ADD TO CART ✓</button>
      <a href="https://wa.me/6285218265003" target="_blank" class="pys-btn-wa" title="Chat via WhatsApp">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.555 4.122 1.524 5.857L0 24l6.335-1.652A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818c-1.855 0-3.622-.508-5.167-1.462l-.37-.22-3.834 1.006 1.024-3.735-.24-.383A9.788 9.788 0 012.182 12 9.818 9.818 0 0112 2.182 9.818 9.818 0 0121.818 12 9.818 9.818 0 0112 21.818z"/></svg>
      </a>
    </div>
    <!-- Hidden buy now for product.js -->
    <button id="btnBuyNow" style="display:none;"></button>
  </div>
</div>

<!-- ═══ RELATED PRODUCTS ════════════════════════ -->
<div class="pys-related">
  <h2>Produk Terkait</h2>
  <div id="relatedProducts" class="pys-related-grid"></div>
</div>

<!-- ═══ SCRIPTS ═════════════════════════════════ -->
<script src="/js/app.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/product.js"></script>

<script>
  // Update breadcrumb when product loads
  const origRender = renderProduct;
  renderProduct = function(product) {
    origRender(product);
    document.getElementById('breadcrumbTitle').textContent = product.title.toUpperCase();
    document.getElementById('breadcrumbCategory').textContent = (product.product_type || 'SKINCARE').toUpperCase();
    document.getElementById('mainImage').classList.remove('skeleton');
    
    // Show sale badge
    if (product.compare_at_price && parseFloat(product.compare_at_price) > parseFloat(product.price)) {
      const discount = Math.round((1 - parseFloat(product.price) / parseFloat(product.compare_at_price)) * 100);
      const badge = document.getElementById('saleBadge');
      badge.textContent = '-' + discount + '%';
      badge.style.display = 'block';
    }
  };
</script>

</body>
</html>
